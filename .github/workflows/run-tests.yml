name: 'Run unit tests'

on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  run_tests:
    name: Run Django Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgis://postgres:postgres@localhost:5432/postgres
      LOCAL_MEDIA_STORAGE: true
    services:
      postgres:
        image: postgis/postgis:15-3.5-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --mount type=tmpfs,destination=/var/lib/postgresql/data --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      #----------------------------------------------
      # Install GDAL into the environment
      #----------------------------------------------
      - name: Install GDAL
        id: install-gdal
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gdal-bin libgdal-dev
      #----------------------------------------------
      # Checkout repo
      #----------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v6
        id: checkout-repo
        with:
          fetch-depth: 0
      #----------------------------------------------
      # Install & configure uv
      #----------------------------------------------
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.11'
          enable-cache: true
      #----------------------------------------------
      # Install project dependencies
      # NOTE: this action requires the venv --seed step due to usage of Python 3.11
      #----------------------------------------------
      - name: Install dependencies
        run: |
          uv venv --seed
          uv run pip install setuptools==81.0.0
          uv sync
      #----------------------------------------------
      # Run unit tests
      #----------------------------------------------
      - name: Run tests
        run: |
          uv run python manage.py migrate
          uv run python manage.py collectstatic
          uv run python manage.py test --noinput --failfast --verbosity 0
